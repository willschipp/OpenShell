id: google-vertex-ai
display_name: Google Vertex AI
description: Google Vertex AI inference provider (Anthropic Claude, Gemini, and third-party models)
category: inference
inference_capable: true
credentials:
  - name: service_account_key
    description: Google service account JSON refresh bootstrap material; not injected into sandboxes
    env_vars: [GOOGLE_SERVICE_ACCOUNT_KEY]
    required: false
  - name: service_account_token
    description: Google Cloud access token refreshed from service account JWT material
    env_vars: [GOOGLE_VERTEX_AI_SERVICE_ACCOUNT_TOKEN, VERTEX_AI_SERVICE_ACCOUNT_TOKEN]
    required: false
    auth_style: bearer
    header_name: authorization
    refresh:
      strategy: google_service_account_jwt
      token_url: https://oauth2.googleapis.com/token
      scopes: [https://www.googleapis.com/auth/cloud-platform]
      refresh_before_seconds: 300
      max_lifetime_seconds: 3600
      material:
        - name: client_email
          description: Google service account email
          required: true
        - name: private_key
          description: Google service account private key
          required: true
          secret: true
        - name: subject
          description: Optional delegated user email for domain-wide delegation
  - name: gcloud_adc_token
    description: Google Cloud access token refreshed via gcloud Application Default Credentials
    env_vars: [GOOGLE_VERTEX_AI_TOKEN, VERTEX_AI_TOKEN]
    required: false
    auth_style: bearer
    header_name: authorization
    refresh:
      strategy: oauth2_refresh_token
      token_url: https://oauth2.googleapis.com/token
      scopes: [https://www.googleapis.com/auth/cloud-platform]
      refresh_before_seconds: 300
      max_lifetime_seconds: 3600
      material:
        - name: client_id
          description: Google OAuth2 client ID from gcloud ADC
          required: true
        - name: client_secret
          description: Google OAuth2 client secret from gcloud ADC
          required: true
          secret: true
        - name: refresh_token
          description: Google OAuth2 refresh token from gcloud ADC
          required: true
          secret: true
discovery:
  credentials: [service_account_token, gcloud_adc_token]
endpoints:
  - host: "*-aiplatform.googleapis.com"
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
  - host: "aiplatform.googleapis.com"
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
  - host: "aiplatform.us.rep.googleapis.com"
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
  - host: "aiplatform.eu.rep.googleapis.com"
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
